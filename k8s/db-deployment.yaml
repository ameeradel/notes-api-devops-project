apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-deployment
  labels:
    app: notes-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notes-db
  template:
    metadata:
      labels:
        app: notes-db
    spec:
      containers:
      - name: notes-api-db
        image: postgres:16
        ports:
        - containerPort: 5432
        envFrom:    
        - secretRef:
            name: notes-api-secret  
            
---
apiVersion: v1
kind: Service
metadata:
  name: db-service
spec:
  selector:
      app: notes-db
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
